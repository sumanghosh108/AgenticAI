version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agenticai_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agenticai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: agenticai_api
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/agenticai
      - API_BASE_URL=http://localhost:8000/api
      - ENVIRONMENT=production
    volumes:
      - .:/app
      - report_data:/app/generated_report
      - memory_data:/app/memory_store

  frontend:
    build: ./frontend
    container_name: agenticai_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  report_data:
  memory_data:
